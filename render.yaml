services:
  # Backend API Service
  - type: web
    name: edureach-backend
    env: node
    repo: https://github.com/Salmonnaik/edureach-platform_main.git
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
